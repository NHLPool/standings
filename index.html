<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Puck Pool -- NHL Fantasy League Tracker.">
<title>Puck Pool -- NHL Fantasy League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--surface:#0f1e35;--card:#162a46;--card2:#1c304f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--ab:#60a5fa;
  --gold:#f59e0b;--silver:#9ca3af;--bronze:#cd7f32;--green:#22c55e;--red:#ef4444;
}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding-bottom:4rem;-webkit-font-smoothing:antialiased}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.5rem;color:#fff;display:flex;align-items:center;gap:.5rem}
.puck{width:26px;height:13px;background:var(--accent);border-radius:50%;flex-shrink:0}
.header-right{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:500;white-space:nowrap}
.badge-season{background:rgba(59,130,246,.12);color:var(--ab);border:1px solid rgba(59,130,246,.25)}
.badge-live{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:5px 9px;font-size:.95rem;transition:all .15s;line-height:1}
.icon-btn:hover{color:var(--text);border-color:var(--border2)}

/* SEASON BAR */
.season-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.season-bar-label{font-size:.7rem;color:var(--muted);font-weight:500;white-space:nowrap}
.season-pills{display:flex;gap:5px;flex-wrap:wrap}
.season-pill{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.04em;padding:4px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.season-pill.active{background:rgba(59,130,246,.15);color:var(--ab);border-color:rgba(59,130,246,.35)}
.season-pill:hover:not(.active){color:var(--text);border-color:var(--border2)}
.season-pill.future{font-style:italic}

/* MAIN */
main{max-width:1080px;margin:0 auto;padding:1.75rem 1.25rem}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem}
.meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:.5rem;flex-wrap:wrap}
.last-updated{font-size:.7rem;color:var(--muted)}
.data-source{font-size:.65rem;color:var(--muted);opacity:.55}

/* INFO BANNER */
.info-banner{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:1.25rem 1.5rem;color:var(--ab);font-size:.88rem;text-align:center;margin-bottom:2rem;line-height:1.6}

/* PODIUM */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:2rem;align-items:start}
.podium-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem .85rem;text-align:center;transition:transform .18s;animation:fadeIn .4s ease both}
.podium-card:hover{transform:translateY(-3px)}
.podium-card.first{border-color:rgba(245,158,11,.45)}
.podium-card.second{border-color:rgba(156,163,175,.3)}
.podium-card.third{border-color:rgba(205,127,50,.3)}
.podium-rank{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;margin-bottom:.3rem}
.first .podium-rank{color:var(--gold)}.second .podium-rank{color:var(--silver)}.third .podium-rank{color:var(--bronze)}
.podium-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.25rem;color:#fff;margin-bottom:.15rem}
.podium-pts{font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;font-weight:700;color:var(--ab);line-height:1.1}
.podium-pts-label{font-size:.7rem;color:var(--muted)}
.podium-teams{display:flex;justify-content:center;gap:4px;margin-top:.55rem;flex-wrap:wrap}
.mini-chip{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.62rem;color:var(--muted);font-weight:500}

/* LEADERBOARD */
.leaderboard{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:2.5rem}
.lb-grid{display:grid;grid-template-columns:36px 1fr 72px 72px 72px 70px;gap:6px;align-items:center}
.lb-header{padding:.55rem 1.2rem;background:var(--surface);font-size:.64rem;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);border-bottom:1px solid var(--border)}
.lb-row{padding:.7rem 1.2rem;border-bottom:1px solid var(--border);transition:background .12s;animation:fadeIn .35s ease both}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(255,255,255,.025)}
.lb-row.extras{opacity:.48}
.rank-cell{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;color:var(--muted);text-align:center}
.rank-cell.top{color:#fff}
.player-name{font-weight:500;font-size:.92rem;color:#fff;line-height:1.2}
.player-chips{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.team-chip{font-size:.58rem;padding:1px 5px;border-radius:3px;font-weight:500;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--border)}
.pts-cell{text-align:right;font-size:.8rem;color:var(--text)}
.pts-cell .pt-abbr{font-size:.58rem;color:var(--muted);display:block;line-height:1;margin-bottom:1px}
.total-cell{font-family:'Barlow Condensed',sans-serif;font-size:1.35rem;font-weight:700;color:var(--ab);text-align:right}
.extras-tag{font-size:.58rem;padding:1px 5px;border-radius:3px;background:rgba(148,163,184,.08);color:var(--muted);border:1px solid var(--border);margin-left:5px;vertical-align:middle}

/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(122px,1fr));gap:9px}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem .7rem;text-align:center;transition:transform .15s,border-color .15s;animation:fadeIn .3s ease both}
.team-card:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.3)}
.team-abbr{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:#fff}
.team-name-sm{font-size:.58rem;color:var(--muted);margin:2px 0 8px;line-height:1.35}
.team-pts{font-family:'Barlow Condensed',sans-serif;font-size:1.55rem;font-weight:700;color:var(--ab);line-height:1}
.team-record{font-size:.58rem;color:var(--muted);margin-top:3px}
.team-owner{font-size:.58rem;color:var(--ab);margin-top:4px;opacity:.75}

/* STATES */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1.5rem;gap:.9rem;color:var(--muted);text-align:center}
.spinner{width:34px;height:34px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
.state-sub{font-size:.75rem;opacity:.7}
.error-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:10px;padding:1.5rem;color:#fca5a5;font-size:.85rem;text-align:center;line-height:1.65;margin:2rem 0}
.error-box strong{display:block;margin-bottom:.4rem;font-size:.95rem}
.retry-btn{display:inline-block;margin-top:.9rem;padding:6px 18px;border-radius:6px;border:1px solid rgba(239,68,68,.3);background:transparent;color:#fca5a5;cursor:pointer;font-size:.82rem;font-family:inherit;transition:background .15s}
.retry-btn:hover{background:rgba(239,68,68,.1)}


/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* RESPONSIVE */
@media(max-width:620px){
  .lb-grid{grid-template-columns:30px 1fr 52px 52px 52px}
  .podium{grid-template-columns:1fr;gap:8px}
  header{padding:.9rem 1rem}
  .badge-season{display:none}
  .modal{padding:1.25rem}
}
</style>
</head>
<body>

<header>
  <span class="logo"><span class="puck"></span>Puck Pool</span>
  <div class="header-right">
    <span class="badge badge-season" id="hdr-season-badge">2025-26 Season</span>
    <span class="badge badge-live"><span class="live-dot"></span>Live</span>

  </div>
</header>

<div class="season-bar">
  <span class="season-bar-label">Season:</span>
  <div class="season-pills" id="season-pills"></div>
</div>

<main id="main-content">
  <div class="state-box"><div class="spinner"></div><div>Loading standings…</div></div>
</main>


<script>
'use strict';

/* ═══════════════════════════════════════════
   EDITABLE LEAGUE CONFIG (players, teams, seasons)
   ───────────────────────────────────────────
   How to use:
   • Each season has its OWN `players` list so history is preserved.
   • Edit teams inside the season you want to change (usually next year's future season).
   • Flip seasons by changing `type`:
       - future → current (when season starts)
       - current → past (when season ends)
   • Past seasons use `finalDate` (YYYY-MM-DD) to lock in a snapshot of standings.

   Season id format: YYYYYYYY (startYear + endYear), e.g. 20252026 for 2025-26.
   ─────────────────────────────────────────── */

const SEASON_CONFIG = {
  // Current season
  '20252026': {
    label: '2025-26',
    type: 'current', // 'current' | 'past' | 'future'
    finalDate: '2026-04-18', // used only when type === 'past' (edit to actual final standings date)
    players: [
      { name:'Ian',   teams:['COL','OTT','DET'] },
      { name:'Will',  teams:['DAL','STL','BOS'] },
      { name:'Dave',  teams:['VGK','MTL','PHI'] },
      { name:'Dan',   teams:['CAR','NYR','CBJ'] },
      { name:'Monti', teams:['WSH','BUF','NYI'] },
      { name:'Soap',  teams:['TBL','MIN','SEA'] },
      { name:'Corey', teams:['EDM','VAN','ANA'] },
      { name:'Schum', teams:['FLA','UTA','CHI'] },
      { name:'Paul',  teams:['TOR','LAK','CGY'] },
      { name:'Henry', teams:['WPG','NJD','NSH'] },
      { name:'Extras', teams:['PIT','SJS'], extras:true },
    ],
  },

  // Future seasons (edit these teams after each draft)
  '20262027': {
    label: '2026-27',
    type: 'future',
    finalDate: '2027-04-18', // used only when type === 'past'
    players: [
      { name:'Ian',   teams:['COL','OTT','DET'] },
      { name:'Will',  teams:['DAL','STL','BOS'] },
      { name:'Dave',  teams:['VGK','MTL','PHI'] },
      { name:'Dan',   teams:['CAR','NYR','CBJ'] },
      { name:'Monti', teams:['WSH','BUF','NYI'] },
      { name:'Soap',  teams:['TBL','MIN','SEA'] },
      { name:'Corey', teams:['EDM','VAN','ANA'] },
      { name:'Schum', teams:['FLA','UTA','CHI'] },
      { name:'Paul',  teams:['TOR','LAK','CGY'] },
      { name:'Henry', teams:['WPG','NJD','NSH'] },
      { name:'Extras', teams:['PIT','SJS'], extras:true },
    ],
  },
  '20272028': {
    label: '2027-28',
    type: 'future',
    finalDate: '2028-04-18', // used only when type === 'past'
    players: [
      { name:'Ian',   teams:['COL','OTT','DET'] },
      { name:'Will',  teams:['DAL','STL','BOS'] },
      { name:'Dave',  teams:['VGK','MTL','PHI'] },
      { name:'Dan',   teams:['CAR','NYR','CBJ'] },
      { name:'Monti', teams:['WSH','BUF','NYI'] },
      { name:'Soap',  teams:['TBL','MIN','SEA'] },
      { name:'Corey', teams:['EDM','VAN','ANA'] },
      { name:'Schum', teams:['FLA','UTA','CHI'] },
      { name:'Paul',  teams:['TOR','LAK','CGY'] },
      { name:'Henry', teams:['WPG','NJD','NSH'] },
      { name:'Extras', teams:['PIT','SJS'], extras:true },
    ],
  },
  '20282029': {
    label: '2028-29',
    type: 'future',
    finalDate: '2029-04-18', // used only when type === 'past'
    players: [
      { name:'Ian',   teams:['COL','OTT','DET'] },
      { name:'Will',  teams:['DAL','STL','BOS'] },
      { name:'Dave',  teams:['VGK','MTL','PHI'] },
      { name:'Dan',   teams:['CAR','NYR','CBJ'] },
      { name:'Monti', teams:['WSH','BUF','NYI'] },
      { name:'Soap',  teams:['TBL','MIN','SEA'] },
      { name:'Corey', teams:['EDM','VAN','ANA'] },
      { name:'Schum', teams:['FLA','UTA','CHI'] },
      { name:'Paul',  teams:['TOR','LAK','CGY'] },
      { name:'Henry', teams:['WPG','NJD','NSH'] },
      { name:'Extras', teams:['PIT','SJS'], extras:true },
    ],
  },
};

// Derived seasons list (controls the pill bar order)
const SEASONS = Object.keys(SEASON_CONFIG)
  .sort() // chronological by id
  .map(id => ({ id, label: SEASON_CONFIG[id].label, type: SEASON_CONFIG[id].type }));

const ALL_NHL_TEAMS = {
  COL:'Colorado Avalanche',   OTT:'Ottawa Senators',      DET:'Detroit Red Wings',
  DAL:'Dallas Stars',         STL:'St. Louis Blues',       BOS:'Boston Bruins',
  VGK:'Vegas Golden Knights', MTL:'Montreal Canadiens',    PHI:'Philadelphia Flyers',
  CAR:'Carolina Hurricanes',  NYR:'New York Rangers',      CBJ:'Columbus Blue Jackets',
  WSH:'Washington Capitals',  BUF:'Buffalo Sabres',        NYI:'New York Islanders',
  TBL:'Tampa Bay Lightning',  MIN:'Minnesota Wild',        SEA:'Seattle Kraken',
  EDM:'Edmonton Oilers',      VAN:'Vancouver Canucks',     ANA:'Anaheim Ducks',
  FLA:'Florida Panthers',     UTA:'Utah Mammoth',          CHI:'Chicago Blackhawks',
  TOR:'Toronto Maple Leafs',  LAK:'Los Angeles Kings',     CGY:'Calgary Flames',
  WPG:'Winnipeg Jets',        NJD:'New Jersey Devils',     NSH:'Nashville Predators',
  PIT:'Pittsburgh Penguins',  SJS:'San Jose Sharks',
};

const NAME_MAP = {
  'Colorado Avalanche':'COL','Ottawa Senators':'OTT','Detroit Red Wings':'DET',
  'Dallas Stars':'DAL','St. Louis Blues':'STL','Boston Bruins':'BOS',
  'Vegas Golden Knights':'VGK','Montreal Canadiens':'MTL','Montréal Canadiens':'MTL',
  'Philadelphia Flyers':'PHI','Carolina Hurricanes':'CAR','New York Rangers':'NYR',
  'Columbus Blue Jackets':'CBJ','Washington Capitals':'WSH','Buffalo Sabres':'BUF',
  'New York Islanders':'NYI','Tampa Bay Lightning':'TBL','Minnesota Wild':'MIN',
  'Seattle Kraken':'SEA','Edmonton Oilers':'EDM','Vancouver Canucks':'VAN',
  'Anaheim Ducks':'ANA','Florida Panthers':'FLA','Utah Mammoth':'UTA',
  'Chicago Blackhawks':'CHI','Toronto Maple Leafs':'TOR','Los Angeles Kings':'LAK',
  'Calgary Flames':'CGY','Winnipeg Jets':'WPG','New Jersey Devils':'NJD',
  'Nashville Predators':'NSH','Pittsburgh Penguins':'PIT','San Jose Sharks':'SJS',
};

function getSeasonPlayers(seasonId) {
  return SEASON_CONFIG[String(seasonId)]?.players ?? [];
}

function seasonLabel(id) {
  const s = String(id);
  if (s.length === 8) return s.slice(0,4) + '-' + s.slice(6);
  return s;
}

/* ═══════════════════════════════════════════
   NHL API / PROXIES
═══════════════════════════════════════════ */
const PROXIES = [
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];
let workingProxy = 0;

async function fetchNHL(url) {
  for (let i = workingProxy; i < PROXIES.length; i++) {
    try {
      const res = await fetch(PROXIES[i](url), { signal: AbortSignal.timeout(10000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      workingProxy = i;
      return data;
    } catch(e) {
      if (i === PROXIES.length - 1) throw e;
    }
  }
}

function parseStandings(standings) {
  const pts = {}, rec = {};
  for (const s of standings) {
    let abbr = s.teamAbbrev?.default;
    if (!abbr || !ALL_NHL_TEAMS[abbr]) abbr = NAME_MAP[s.teamName?.default] || NAME_MAP[s.teamCommonName?.default];
    if (!abbr) continue;
    pts[abbr] = s.points ?? ((s.wins ?? 0) * 2 + (s.otLosses ?? 0));
    rec[abbr]  = { w: s.wins ?? 0, l: s.losses ?? 0, otl: s.otLosses ?? 0 };
  }
  return { pts, rec };
}

/* season id → date string for NHL API, e.g. 20252026 → standings/now or standings/2024-04-18 */
function getNHLUrl(seasonId, type) {
  if (type === 'current') return 'https://api-web.nhle.com/v1/standings/now';
  if (type === 'future') return null;

  // past: use a fixed snapshot date so scores stay correct even after moving to the next season.
  // Prefer per-season `finalDate` (YYYY-MM-DD). Fallback: April 18 of the end year.
  const cfg = SEASON_CONFIG[String(seasonId)];
  const fallback = `${String(seasonId).slice(4)}-04-18`;
  const date = cfg?.finalDate || fallback;
  return `https://api-web.nhle.com/v1/standings/${date}`;
}

/* ═══════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════ */
let currentPts = {}, currentRec = {}, proxyLabel = '';
let activeSeason = (SEASONS.find(s => s.type === 'current')?.id) ?? SEASONS[0]?.id;

/* ═══════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════ */
const h = (tag, attrs, ...children) => {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs || {})) {
    if (k === 'class') el.className = v;
    else if (k === 'style') el.style.cssText = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.append(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
};

/* ═══════════════════════════════════════════
   SEASON PILLS
═══════════════════════════════════════════ */
function renderSeasonPills() {
  const container = document.getElementById('season-pills');
  container.innerHTML = '';
  for (const s of SEASONS) {
    const pill = h('button', {
      class: `season-pill${s.type === 'future' ? ' future' : ''}${s.id === activeSeason ? ' active' : ''}`,
      onclick: () => selectSeason(s.id),
    }, s.label || seasonLabel(s.id));
    container.append(pill);
  }
  // Update header badge
  const active = SEASONS.find(s => s.id === activeSeason);
  const badge = document.getElementById('hdr-season-badge');
  if (badge && active) badge.textContent = (active.label || seasonLabel(active.id)) + ' Season';
}

function selectSeason(id) {
  activeSeason = id;
  renderSeasonPills();
  loadStandings();
}

/* ═══════════════════════════════════════════
   LOAD STANDINGS
═══════════════════════════════════════════ */
async function loadStandings() {
  const main = document.getElementById('main-content');
  const season = SEASONS.find(s => s.id === activeSeason);
  if (!season) return;

  // Future season -- no data yet
  if (season.type === 'future') {
    currentPts = {}; currentRec = {};
    renderPage(true);
    return;
  }

  main.innerHTML = '<div class="state-box"><div class="spinner"></div><div>Loading standings…</div></div>';

  try {
    const url = getNHLUrl(season.id, season.type);
    const data = await fetchNHL(url);
    if (!data?.standings) throw new Error('Unexpected API response');
    const parsed = parseStandings(data.standings);
    currentPts = parsed.pts;
    currentRec = parsed.rec;
    proxyLabel = ['allorigins','corsproxy','codetabs'][workingProxy];
    renderPage(false);
    if (season.type === 'current') setTimeout(loadStandings, 10 * 60 * 1000);
  } catch(err) {
    main.innerHTML = '';
    main.append(h('div', { class:'error-box' },
      h('strong', {}, 'Could not load standings'),
      err.message,
      h('br', {}),
      h('button', { class:'retry-btn', onclick: loadStandings }, '↺ Retry')
    ));
  }
}

/* ═══════════════════════════════════════════
   RENDER PAGE
═══════════════════════════════════════════ */
function playerTotal(p) {
  return p.teams.reduce((s, t) => s + (currentPts[t] ?? 0), 0);
}

function getRankedPlayers() {
  const players = getSeasonPlayers(activeSeason);
  return [...players]
    .filter(p => !p.extras)
    .sort((a, b) => playerTotal(b) - playerTotal(a))
    .map((p, i) => ({ ...p, rank: i + 1 }));
}

function renderPage(isFuture) {
  const main = document.getElementById('main-content');
  const season = SEASONS.find(s => s.id === activeSeason);
  const players = getSeasonPlayers(activeSeason);
  main.innerHTML = '';

  if (isFuture) {
    main.append(h('div', { class:'info-banner' },
      `🏒 The ${season.label || seasonLabel(season.id)} season hasn't started yet. `,
      'Check back when the season begins -- standings will update automatically.'
    ));
  }

  const ranked = getRankedPlayers();
  const extras = players.find(p => p.extras);
  const now = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

  if (!isFuture) {
    main.append(h('div', { class:'meta-row' },
      h('div', { class:'last-updated' }, `Updated ${now} · auto-refreshes every 10 min`),
      h('div', { class:'data-source' }, `via ${proxyLabel}`)
    ));
  }

  // PODIUM -- 1st, 2nd, 3rd left to right
  if (ranked.length >= 1 && !isFuture) {
    main.append(h('div', { class:'section-label' }, 'Top 3'));
    main.append(h('div', { class:'podium' },
      makePodiumCard(ranked[0], 'first'),
      makePodiumCard(ranked[1], 'second'),
      makePodiumCard(ranked[2], 'third'),
    ));
  }

  // LEADERBOARD
  main.append(h('div', { class:'section-label' }, isFuture ? 'Players This Season' : 'Full Standings'));
  const lb = h('div', { class:'leaderboard' });
  lb.append(h('div', { class:'lb-grid lb-header' },
    h('div', {}, '#'),
    h('div', {}, 'Player'),
    h('div', { style:'text-align:right' }, 'Team 1'),
    h('div', { style:'text-align:right' }, 'Team 2'),
    h('div', { style:'text-align:right' }, 'Team 3'),
    h('div', { style:'text-align:right' }, isFuture ? 'Teams' : 'Total'),
  ));
  for (const p of ranked) lb.append(makeRow(p, false, isFuture));
  if (extras) lb.append(makeRow(extras, true, isFuture));
  main.append(lb);

  // TEAM GRID (only for live/past seasons)
  if (!isFuture) {
    main.append(h('div', { class:'section-label', style:'margin-top:2.5rem' }, 'All Teams -- Points This Season'));
    const grid = h('div', { class:'team-grid' });
    for (const abbr of Object.keys(ALL_NHL_TEAMS)) {
      const allPlayers = getSeasonPlayers(activeSeason);
      const owner = allPlayers.find(p => p.teams.includes(abbr));
      const ownerLabel = owner ? (owner.extras ? 'Extras' : owner.name) : '';
      grid.append(h('div', { class:'team-card' },
        h('div', { class:'team-abbr' }, abbr),
        h('div', { class:'team-name-sm' }, ALL_NHL_TEAMS[abbr]),
        h('div', { class:'team-pts' }, String(currentPts[abbr] ?? '--')),
        currentRec[abbr] ? h('div', { class:'team-record' }, `${currentRec[abbr].w}-${currentRec[abbr].l}-${currentRec[abbr].otl}`) : null,
        ownerLabel ? h('div', { class:'team-owner' }, ownerLabel) : null,
      ));
    }
    main.append(grid);
  }
}

function makePodiumCard(p, cls) {
  if (!p) return h('div', {});
  const emoji = { first:'🥇', second:'🥈', third:'🥉' }[cls];
  const tot = playerTotal(p);
  return h('div', { class:`podium-card ${cls}` },
    h('div', { class:'podium-rank' }, emoji),
    h('div', { class:'podium-name' }, p.name),
    h('div', { class:'podium-pts' }, String(tot)),
    h('div', { class:'podium-pts-label' }, 'pts'),
    h('div', { class:'podium-teams' },
      ...p.teams.map(t => h('span', { class:'mini-chip' }, `${t} ${currentPts[t] ?? '--'}`))
    )
  );
}

function makeRow(p, isExtras, isFuture) {
  const pts   = p.teams.map(t => currentPts[t] ?? 0);
  const tot   = playerTotal(p);
  const medal = p.rank === 1 ? '🥇' : p.rank === 2 ? '🥈' : p.rank === 3 ? '🥉' : String(p.rank ?? '--');
  const nameEl = h('div', { class:'player-name' }, p.name);
  if (isExtras) nameEl.append(h('span', { class:'extras-tag' }, 'unowned'));

  return h('div', { class:`lb-grid lb-row${isExtras ? ' extras' : ''}` },
    h('div', { class:`rank-cell${p.rank <= 3 ? ' top' : ''}` }, isExtras ? '--' : medal),
    h('div', {},
      nameEl,
      h('div', { class:'player-chips' }, ...p.teams.map(t => h('span', { class:'team-chip' }, t)))
    ),
    h('div', { class:'pts-cell' },
      h('span', { class:'pt-abbr' }, p.teams[0] ?? ''),
      isFuture ? '--' : String(pts[0])
    ),
    h('div', { class:'pts-cell' },
      h('span', { class:'pt-abbr' }, p.teams[1] ?? ''),
      isFuture ? '--' : String(pts[1])
    ),
    h('div', { class:'pts-cell' },
      h('span', { class:'pt-abbr' }, p.teams[2] ?? '--'),
      isFuture ? '--' : String(pts[2] ?? '--')
    ),
    h('div', { class:'total-cell', style: isExtras ? 'color:var(--muted)' : '' },
      isFuture ? String(p.teams.length) : String(tot)
    )
  );
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
renderSeasonPills();
loadStandings();
</script>

</html>
